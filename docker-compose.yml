version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=comparison_study
    ports:
      - "5432:5432"
      
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_ELIXIR_API_URL=http://localhost:4000
      - NEXT_PUBLIC_CSHARP_API_URL=http://localhost:5000
    depends_on:
      - elixir_backend 
      - csharp-backend

  elixir_backend:       
    build: ./elixir_backend
    ports:
      - "4000:4000"
    depends_on:         # Good idea to make the backend wait for the DB too
      - db

  csharp-backend:
    build: ./csharp-backend
    ports:
      - "5000:5000"
    depends_on:
      - db