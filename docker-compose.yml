  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_ELIXIR_API_URL=http://localhost:4000
      - NEXT_PUBLIC_CSHARP_API_URL=http://localhost:5000
    depends_on:
      - elixir_backend 
      - csharp-backend

  elixir_backend:       
    build: ./elixir_backend
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=ecto://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - PHX_SERVER=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    #depends_on:         # Good idea to make the backend wait for the DB too
    #  - db

  csharp-backend:
    build: ./csharp-backend
    ports:
      - "5000:5000"
    environment:
      - ConnectionStrings__DefaultConnection=Server=${DB_HOST},${DB_PORT};Database=${DB_NAME};User Id=${DB_USER};Password=${DB_PASSWORD};TrustServerCertificate=True;
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    #depends_on:
    #  - db

volumes:
  postgres_data: