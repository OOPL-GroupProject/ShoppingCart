version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - ELIXIR_API_URL=http://elixir-backend:4000
      - CSHARP_API_URL=http://csharp-backend:5000
    depends_on:
      - elixir-backend
      - csharp-backend

  elixir-backend:
    build: ./backend-elixir
    ports:
      - "4000:4000"

  csharp-backend:
    build: ./backend-csharp
    ports:
      - "5000:5000"